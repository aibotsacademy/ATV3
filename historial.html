<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>AVSEC PRO — Mi Historial</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#020B14;--deep:#030F1C;--panel:#0A2035;--card:#0d2540;
  --cyan:#00E5FF;--cyan2:#00B8D4;--neon:#39FF14;--amber:#FFB300;
  --red:#FF1744;--violet:#E040FB;
  --t1:#E0F7FA;--t2:#80DEEA;--t3:#4DD0E1;--dim:#37474F;
  --mono:'Share Tech Mono',monospace;--head:'Orbitron',sans-serif;--body:'Exo 2',sans-serif;
  --glow-cyan:0 0 10px #00E5FF50,0 0 30px #00E5FF20;
  --glow-neon:0 0 10px #39FF1450;--glow-amber:0 0 10px #FFB30050;
  --nav-h:56px;--bottom-h:66px;
}
html{background:var(--void);color:var(--t1);font-family:var(--body);height:100%}
body{min-height:100%;overflow-x:hidden;padding-bottom:var(--bottom-h)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--deep)}
::-webkit-scrollbar-thumb{background:var(--cyan2);border-radius:2px}

/* ── ANIMATIONS ── */
@keyframes rotate-slow{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes rotate-ccw{from{transform:rotate(0)}to{transform:rotate(-360deg)}}
@keyframes holo{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes slide-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.holo{background:linear-gradient(90deg,var(--cyan),#fff,var(--cyan2),var(--cyan));
  background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:holo 4s linear infinite}
.su{animation:slide-up .3s ease both}

/* ── TOP NAV ── */
.topnav{position:sticky;top:0;z-index:200;height:var(--nav-h);
  background:rgba(3,15,28,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,229,255,.12);
  display:flex;align-items:center;padding:0 14px;gap:10px}
.nav-logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-ring{position:relative;width:28px;height:28px;flex-shrink:0}
.nav-ring::before{content:'';position:absolute;inset:0;border-radius:50%;
  border:1.5px solid transparent;border-top-color:var(--cyan);border-right-color:var(--cyan);
  animation:rotate-slow 3s linear infinite;opacity:.7}
.nav-ring::after{content:'';position:absolute;inset:4px;border-radius:50%;
  border:1px solid transparent;border-bottom-color:var(--cyan);border-left-color:var(--cyan);
  animation:rotate-ccw 2s linear infinite;opacity:.4}
.nav-ring-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.nav-title{font-family:var(--head);font-size:13px;font-weight:900;letter-spacing:.1em;line-height:1}
.nav-sub{font-family:var(--mono);font-size:7px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.nav-actions{margin-left:auto;display:flex;gap:6px;align-items:center}

/* ── BOTTOM TAB BAR (mobile-first) ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;height:var(--bottom-h);
  background:rgba(3,15,28,.97);backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,229,255,.12);
  display:flex;align-items:stretch}
.bottom-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:transparent;border:none;cursor:pointer;
  padding:6px 4px 10px;transition:all .15s;position:relative}
.bottom-tab .bt-icon{font-size:18px;line-height:1;transition:transform .15s}
.bottom-tab .bt-label{font-family:var(--mono);font-size:8px;letter-spacing:.06em;
  color:var(--dim);transition:color .15s;white-space:nowrap}
.bottom-tab.active .bt-icon{transform:translateY(-2px)}
.bottom-tab.active .bt-label{color:var(--cyan)}
.bottom-tab.active::after{content:'';position:absolute;top:0;left:20%;right:20%;
  height:2px;background:var(--cyan);border-radius:0 0 2px 2px;box-shadow:0 0 6px var(--cyan)}
/* New report button — center slot */
.bottom-tab.new-report{flex:1.2}
.bottom-tab.new-report .bt-icon{
  width:44px;height:44px;border-radius:50%;
  background:var(--cyan);color:var(--void);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;
  box-shadow:var(--glow-cyan);
  transition:all .2s;margin-bottom:2px}
.bottom-tab.new-report:active .bt-icon{transform:scale(.92)}
.bottom-tab.new-report .bt-label{color:var(--cyan)}

/* ── CONTENT AREA ── */
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,229,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,.04) 1px,transparent 1px);
  background-size:48px 48px}
.content{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:16px 14px}
.tab-content{display:none}.tab-content.active{display:flex;flex-direction:column;gap:14px;animation:fade-in .2s ease}

/* ── CARDS ── */
.stat-card{padding:14px 12px;border-radius:8px;background:var(--card);
  border:1px solid rgba(0,229,255,.1);transition:transform .18s}
.stat-card:hover{transform:translateY(-2px)}
.resume-card{padding:14px;border-radius:10px;background:rgba(255,179,0,.05);
  border:1px solid rgba(255,179,0,.2);display:flex;gap:12px;align-items:flex-start;
  cursor:pointer;transition:all .18s}
.resume-card:hover,.resume-card:active{border-color:var(--amber);background:rgba(255,179,0,.1)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;
  font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.04em;white-space:nowrap}
.badge-in{background:rgba(57,255,20,.12);color:var(--neon);border:1px solid rgba(57,255,20,.3)}
.badge-out{background:rgba(255,23,68,.12);color:var(--red);border:1px solid rgba(255,23,68,.3)}
.badge-insp{background:rgba(0,229,255,.1);color:var(--cyan);border:1px solid rgba(0,229,255,.25)}
.badge-ctrl{background:rgba(57,255,20,.1);color:var(--neon);border:1px solid rgba(57,255,20,.25)}
.badge-ramp{background:rgba(255,179,0,.1);color:var(--amber);border:1px solid rgba(255,179,0,.25)}
.badge-exp{background:rgba(255,23,68,.15);color:var(--red);border:1px solid rgba(255,23,68,.4)}

/* ── BUTTONS ── */
.btn-sm{padding:7px 12px;border-radius:5px;font-family:var(--mono);font-size:9px;
  background:transparent;color:var(--cyan);border:1px solid rgba(0,229,255,.25);
  cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-sm:hover{background:rgba(0,229,255,.08)}
.btn-resume{padding:9px 14px;border-radius:7px;font-family:var(--head);font-size:9px;
  font-weight:700;letter-spacing:.06em;background:var(--amber);color:#1a0f00;border:none;
  cursor:pointer;transition:all .18s;box-shadow:var(--glow-amber);white-space:nowrap;flex-shrink:0}
.btn-resume:hover,.btn-resume:active{background:#ffd040}
.btn-csv{padding:7px 12px;border-radius:5px;font-family:var(--mono);font-size:9px;
  background:transparent;color:var(--neon);border:1px solid rgba(57,255,20,.3);
  cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-csv:hover{background:rgba(57,255,20,.08)}

/* ── FILTERS ── */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
input[type=text],input[type=date],select{
  background:rgba(7,24,40,.9);border:1px solid rgba(0,229,255,.2);border-radius:5px;
  color:var(--t1);padding:8px 10px;font-family:var(--mono);font-size:11px;outline:none;
  -webkit-appearance:none}
input:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,229,255,.08)}
input[type=date],select{min-width:0}

/* ── TABLE (scrollable) ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;
  border:1px solid rgba(0,229,255,.1)}
.tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:600px}
.tbl th{font-family:var(--mono);font-size:8px;letter-spacing:.07em;color:var(--t3);
  padding:8px 10px;text-align:left;border-bottom:1px solid rgba(0,229,255,.12);
  background:rgba(0,229,255,.04);white-space:nowrap;position:sticky;top:0}
.tbl td{padding:8px 10px;border-bottom:1px solid rgba(0,229,255,.05);vertical-align:middle;
  font-family:var(--mono);font-size:10px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(0,229,255,.03)}

/* ── SECTION TITLE ── */
.sec-title{font-family:var(--head);font-size:15px;color:var(--cyan);letter-spacing:.07em}
.sec-sub{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:3px}

/* ── EMPTY / LOADING ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;gap:10px;color:var(--dim);text-align:center}
.empty .ei{font-size:32px;opacity:.35}
.spinner-sm{width:18px;height:18px;border-radius:50%;border:2px solid rgba(0,229,255,.15);
  border-top-color:var(--cyan);animation:spin .8s linear infinite;display:inline-block}

/* ── RESPONSIVE: hide table on very small screens, show cards ── */
@media(max-width:480px){
  .tbl-hide-mobile{display:none}
  .mobile-cards{display:flex!important}
  .nav-sub{max-width:110px}
}
@media(min-width:481px){
  .mobile-cards{display:none}
}
</style>

<body>
<div class="grid-bg"></div>

<!-- ══ TOP NAV ══════════════════════════════════════════════════ -->
<div class="topnav">
  <div class="nav-logo">
    <div class="nav-ring"><div class="nav-ring-icon">✈</div></div>
    <div>
      <div class="nav-title holo">AVSEC<span style="-webkit-text-fill-color:var(--violet);color:var(--violet)">PRO</span></div>
      <div class="nav-sub" id="user-label">MI HISTORIAL</div>
    </div>
  </div>
  <div class="nav-actions">
    <button class="btn-sm" onclick="loadAll()" title="Actualizar datos">↺</button>

      style="color:var(--red);border-color:rgba(255,23,68,.25)"
      title="Cerrar sesión">⏻</button>

</div>

<!-- ══ CONTENT ═════════════════════════════════════════════════ -->
<div class="content">

  <!-- RESUMEN -->
  <div id="tab-resumen" class="tab-content active">
    <div>
      <div class="sec-title">MI ACTIVIDAD</div>
      <div class="sec-sub" id="resumen-period">Cargando...</div>
    </div>
    <div id="kpi-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px"></div>
    <div style="padding:14px 16px;border-radius:8px;background:var(--card);border:1px solid rgba(0,229,255,.1)">
      <div style="font-family:var(--head);font-size:10px;color:var(--cyan);letter-spacing:.06em;margin-bottom:12px">ACTIVIDAD POR TIPO</div>
      <div id="op-bars"></div>
    </div>
    <div id="recent-list" style="display:flex;flex-direction:column;gap:8px">
      <div style="font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.06em">ÚLTIMAS OPERACIONES</div>
    </div>
  </div>

  <!-- REGISTROS -->
  <div id="tab-registros" class="tab-content">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div class="sec-title">MIS REGISTROS</div>
      <button class="btn-csv" onclick="exportCSV()">⬇ CSV</button>
    </div>
    <!-- Filters -->
    <div class="filter-bar">
      <input type="date" id="f-desde" onchange="applyFilter()" style="flex:1;min-width:120px"/>
      <input type="date" id="f-hasta" onchange="applyFilter()" style="flex:1;min-width:120px"/>
      <select id="f-tipo" onchange="applyFilter()" style="flex:1;min-width:110px">
        <option value="all">Todas</option>
        <option value="inspeccion">Inspección</option>
        <option value="control">Accesos</option>
        <option value="rampa">Rampa</option>
      </select>
      <select id="f-estatus" onchange="applyFilter()" style="flex:1;min-width:110px">
        <option value="all">Todos</option>
        <option value="completado">✓ Completados</option>
        <option value="en_proceso">⏳ En proceso</option>
      </select>
    </div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--t3);padding:6px 2px">
      <span id="rec-count" style="color:var(--cyan)">0</span> registros
    </div>
    <!-- Desktop table -->
    <div class="tbl-wrap tbl-hide-mobile">
      <table class="tbl">
        <thead><tr>
          <th>TIPO</th><th>FECHA</th><th>HORA</th><th>VUELO</th>
          <th>NOMBRE</th><th>EMPRESA</th><th>VIGENCIA</th><th>DIR.</th><th>ESTADO</th>

  <!-- RETOMAR -->
  <div id="tab-retomar" class="tab-content">

      <div class="sec-title" style="color:var(--amber)">RETOMAR OPERACIÓN</div>

      <input type="date" id="retomar-fecha" onchange="filterResumable()" style="flex:1;min-width:140px"/>

<!-- ══ BOTTOM TAB BAR ══════════════════════════════════════════ -->
<div class="bottom-bar">
  <button class="bottom-tab active" id="btab-resumen" onclick="switchTab('resumen',this)">
    <div class="bt-icon">📊</div>
    <div class="bt-label">RESUMEN</div>
  </button>
  <button class="bottom-tab" id="btab-registros" onclick="switchTab('registros',this)">
    <div class="bt-icon">📋</div>
    <div class="bt-label">REGISTROS</div>
  </button>
  <!-- CENTER: New report -->
  <button class="bottom-tab new-report" onclick="goNewReport()">
    <div class="bt-icon">+</div>
    <div class="bt-label">NUEVO</div>
  </button>
  <button class="bottom-tab" id="btab-retomar" onclick="switchTab('retomar',this)">
    <div class="bt-icon">⚡</div>
    <div class="bt-label">RETOMAR</div>
  </button>
  <button class="bottom-tab" onclick="window.location.href='login.html'">
    <div class="bt-icon">⚙</div>
    <div class="bt-label">CONFIG</div>
  </button>
  <button class="bottom-tab" onclick="logout()" style="color:var(--red)">
    <div class="bt-icon" style="font-size:16px">⏻</div>
    <div class="bt-label" style="color:var(--red)">SALIR</div>
  </button>
</div>

<script>
const SCRIPT_URL = localStorage.getItem("avsec_apps_script") || "";

// Clean hora: if it arrives as a Date string like "Sat Dec 30 1899 12:51:00..."
// extract just HH:mm
function cleanHora(hora) {
  if (!hora) return "";
  // Already HH:mm format
  if (/^\d{1,2}:\d{2}$/.test(hora.trim())) return hora.trim();
  // Date string from Sheets Time type
  const m = hora.match(/(\d{1,2}):(\d{2}):\d{2}/);
  if (m) return m[1].padStart(2,"0") + ":" + m[2];
  return hora;
}

// Clean cedula/id_cred: remove .0 from numbers stored as float
function cleanNum(val) {
  if (!val) return "";
  return String(val).replace(/\.0$/, "");
}
let currentUser  = null;
let allRecords   = { inspeccion:[], control:[], rampa:[], zonas:[], checkpoints:[] };
let filtered     = [];

// ── INIT ──────────────────────────────────────────────────────
function logout(){
  if(!confirm("¿Cerrar sesión?")) return;
  localStorage.removeItem("avsec_user");
  localStorage.removeItem("avsec_login_time");
  window.location.href = "login.html";
}

window.onload = () => {
  const saved = localStorage.getItem("avsec_user");
  if(!saved){ window.location.href="login.html"; return; }
  try { currentUser = JSON.parse(saved); } catch(e){}
  if(!currentUser?.username){ window.location.href="login.html"; return; }

  const ul = document.getElementById("user-label");
  if(ul) ul.textContent = (currentUser.nombre||currentUser.username).split(" ")[0]
    + " · " + (currentUser.role||"").toUpperCase();

  loadAll();
};

function goNewReport(){
  window.location.href = "index.html?nuevo=1";
}

function switchTab(tab, btn){
  // Bottom bar tabs
  document.querySelectorAll(".bottom-tab").forEach(b=>b.classList.remove("active"));
  // Match by id
  const matchBtn = document.getElementById("btab-"+tab);
  if(matchBtn) matchBtn.classList.add("active");
  // Content
  document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"));
  const tc = document.getElementById("tab-"+tab);
  if(tc) tc.classList.add("active");
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadAll(){
  if(!SCRIPT_URL){ showNoScript(); return; }
  showLoading();
  try {
    const usuario = currentUser.username || "";
    const isAdmin = ["admin","supervisor"].includes((currentUser.role||"").toLowerCase());
    const uParam  = isAdmin ? "" : "&usuario=" + encodeURIComponent(usuario);

    // Fetch helper with redirect + silent error
    async function sf(sheet) {
      try {
        const r = await fetch(`${SCRIPT_URL}?action=getData&sheet=${sheet}${uParam}`, {redirect:"follow"});
        const j = await r.json();
        return j.ok ? (j.data || {}) : {};
      } catch(e) {
        console.warn("[historial] fetch error:", sheet, e.message);
        return {};
      }
    }

    // Single call for inspeccion, control, rampa (proven CORS-safe)
    // Also piggyback zonas+checkpoints by using sheet=all — one request, one CORS handshake
    const data = await sf("all");

    allRecords = {
      inspeccion:  data.inspeccion  || [],
      control:     data.control     || [],
      rampa:       data.rampa       || [],
      zonas:       data.zonas       || [],
      checkpoints: data.checkpoints || [],
    };

    console.log("[historial] loaded — insp:", allRecords.inspeccion.length,
      "ctrl:", allRecords.control.length, "ramp:", allRecords.rampa.length,
      "zonas:", allRecords.zonas.length, "cps:", allRecords.checkpoints.length);

    buildResumen();
    applyFilter();
    buildResumable();
  } catch(e){
    console.error("[historial] loadAll error:", e);
    showError("Error al cargar datos: " + (e.message||"Sin respuesta") +
      '<br><span style="font-size:9px;color:var(--dim)">Verifique la URL del Apps Script.</span>');
  }
}
function showLoading(){
  const kg = document.getElementById("kpi-grid");
  if(kg) kg.innerHTML = `<div style="grid-column:1/-1;display:flex;align-items:center;gap:10px;
    padding:16px;font-family:var(--mono);font-size:10px;color:var(--dim)">
    <div class="spinner-sm"></div> Cargando datos...</div>`;
}

// ── RESUMEN ───────────────────────────────────────────────────
function buildResumen(){
  const all = [...allRecords.inspeccion,...allRecords.control,...allRecords.rampa];
  const today = new Date();
  const todayStr = String(today.getDate()).padStart(2,"0")+"/"+
    String(today.getMonth()+1).padStart(2,"0")+"/"+today.getFullYear();

  const todayCount  = all.filter(r=>(r.fecha||"")===todayStr).length;
  const ingresos    = all.filter(r=>r.direccion!=="SALIDA").length;
  const salidas     = all.filter(r=>r.direccion==="SALIDA").length;
  const expired     = all.filter(r=>r.vigencia && isExpired(r.vigencia)).length;
  const completados = all.filter(r=>(r.estatus||"").toLowerCase()==="completado").length;
  const enProceso   = all.filter(r=>(r.estatus||"en_proceso").toLowerCase()==="en_proceso").length;
  const flights     = [...new Set(all.map(r=>r.vuelo).filter(Boolean))].length;

  const rp = document.getElementById("resumen-period");
  if(rp) rp.textContent = `${all.length} registros totales · ${todayCount} hoy`;

  const kg = document.getElementById("kpi-grid");
  if(kg) kg.innerHTML = [
    kpi("REGISTROS",all.length,"var(--cyan)"),
    kpi("INSPECCIONES",allRecords.inspeccion.length,"var(--cyan)"),
    kpi("ACCESOS",allRecords.control.length,"var(--neon)"),
    kpi("RAMPA",allRecords.rampa.length,"var(--amber)"),
    kpi("COMPLETADOS",completados,"var(--neon)"),
    kpi("EN PROCESO",enProceso,"var(--amber)"),
    kpi("VUELOS",flights,"var(--amber)"),
    kpi("VENCIDAS",expired,expired>0?"var(--red)":"var(--dim)"),
  ].join("");

  const total = Math.max(1,all.length);
  const bars  = document.getElementById("op-bars");
  if(bars) bars.innerHTML = [
    {label:"Inspección",count:allRecords.inspeccion.length,color:"var(--cyan)"},
    {label:"Control Accesos",count:allRecords.control.length,color:"var(--neon)"},
    {label:"Rampa",count:allRecords.rampa.length,color:"var(--amber)"},
  ].map(b=>`<div style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--t3);margin-bottom:4px">
      <span>${b.label}</span><span style="color:${b.color}">${b.count}</span>
    </div>
    <div style="height:5px;background:rgba(0,229,255,.08);border-radius:3px;overflow:hidden">
      <div style="height:100%;border-radius:3px;background:${b.color};
        width:${Math.round(b.count/total*100)}%;transition:width .7s ease;box-shadow:0 0 5px ${b.color}"></div>
    </div>
  </div>`).join("");

  const recent = all.slice(-8).reverse();
  const rl = document.getElementById("recent-list");
  if(!rl) return;
  rl.innerHTML = `<div style="font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.06em">ÚLTIMAS OPERACIONES</div>` +
    (recent.length===0
      ? `<div class="empty"><div class="ei">📋</div><div style="font-family:var(--mono);font-size:10px">Sin registros aún</div></div>`
      : recent.map((r,i)=>{
          const shLabel={inspeccion:"INSP",control:"CTRL",rampa:"RAMP"}[r._sheet]||r._sheet;
          const shCls={inspeccion:"badge-insp",control:"badge-ctrl",rampa:"badge-ramp"}[r._sheet]||"";
          const exp = r.vigencia && isExpired(r.vigencia);
          return `<div class="su" style="animation-delay:${i*.04}s;padding:11px 13px;border-radius:8px;
            background:var(--card);border:1px solid rgba(0,229,255,.08);display:flex;align-items:center;gap:10px">
            <span class="badge ${shCls}" style="flex-shrink:0">${shLabel}</span>
            <div style="flex:1;min-width:0">
              <div style="font-family:var(--head);font-size:11px;color:var(--t1);
                overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.nombre||"—"}</div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:2px;
                overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.empresa||""}</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-family:var(--mono);font-size:10px;color:var(--cyan)">${r.vuelo||""}</div>
              <div style="font-family:var(--mono);font-size:8px;color:var(--dim)">${cleanHora(r.hora)}</div>
              ${exp?`<span class="badge badge-exp" style="margin-top:3px">⚠ VEN</span>`:""}
            </div>
          </div>`;
        }).join(""));
}

// ── REGISTROS ─────────────────────────────────────────────────
function applyFilter(){
  const tipo   = document.getElementById("f-tipo")?.value||"all";
  const desde  = document.getElementById("f-desde")?.value;
  const hasta  = document.getElementById("f-hasta")?.value;
  const estatus= document.getElementById("f-estatus")?.value||"all";

  let pool = [];
  ["inspeccion","control","rampa"].forEach(s=>{
    if(tipo!=="all"&&tipo!==s) return;
    pool = pool.concat((allRecords[s]||[]).map(r=>({...r,_sheet:s})));
  });
  if(estatus!=="all") pool=pool.filter(r=>(r.estatus||"en_proceso").toLowerCase()===estatus);
  if(desde||hasta) pool=pool.filter(r=>{
    const m=(r.fecha||"").match(/(\d{1,2})[\/](\d{1,2})[\/](\d{4})/);
    if(!m) return true;
    const d=new Date(+m[3],+m[2]-1,+m[1]);
    if(desde&&d<new Date(desde)) return false;
    if(hasta&&d>new Date(hasta)) return false;
    return true;
  });
  filtered=pool.sort((a,b)=>(b.timestamp||"").localeCompare(a.timestamp||""));
  const cnt=document.getElementById("rec-count"); if(cnt) cnt.textContent=filtered.length;
  renderRecordsTable();
  renderMobileCards();
}

// ── RETOMAR ───────────────────────────────────────────────────
function buildResumable(){
  const isAdmin = ["admin","supervisor"].includes((currentUser.role||"").toLowerCase());
  const myUser  = (currentUser.username||"").toLowerCase().trim();

  // Helper: build normalized lookup key (vuelo+fecha only)
  // Normalizes fecha to DD/MM/YYYY regardless of source format
  function normFecha(f) {
    if (!f) return "?";
    f = f.trim();
    // Already DD/MM/YYYY
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(f)) return f;
    // YYYY-MM-DD (ISO)
    var m = f.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return m[3] + "/" + m[2] + "/" + m[1];
    // D/M/YYYY or DD/M/YYYY
    var m2 = f.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (m2) return m2[1].padStart(2,"0") + "/" + m2[2].padStart(2,"0") + "/" + m2[3];
    return f;
  }
  function mkKey(vuelo, fecha) {
    return (vuelo||"?").trim().toUpperCase() + "|" + normFecha(fecha);
  }

  // ── Build groups from credential records ──────────────────────
  const all=[
    ...allRecords.inspeccion.map(r=>({...r,_sheet:"inspeccion"})),
    ...allRecords.control.map(r=>({...r,_sheet:"control"})),
    ...allRecords.rampa.map(r=>({...r,_sheet:"rampa"})),
  ];
  const groups={};
  all.forEach(r=>{
    const est     = (r.estatus||"").toLowerCase().trim();
    const rowUser = (r.usuario||"").toLowerCase().trim();
    if(est === "completado") return;
    if(!isAdmin && rowUser !== myUser) return;
    const key = mkKey(r.vuelo, r.fecha);
    if(!groups[key]) groups[key]={
      vuelo:r.vuelo,aerolinea:r.aerolinea,fecha:r.fecha,
      gate:r.gate||"",arr:r.arr||"",dest:r.dest||"",
      dep:r.dep||"",bridge:r.bridge||"",
      usuario:r.usuario||"",records:[],
      sheet:r._sheet,zones:{},checkpoints:{}
    };
    groups[key].records.push(r);
  });

  // ── Filter zonas/checkpoints for current user ─────────────────
  const zonaRecords = (allRecords.zonas||[]).filter(r=>{
    if(!r?.vuelo) return false;
    if((r.estatus||"").toLowerCase()==="completado") return false;
    if(!isAdmin && (r.usuario||"").toLowerCase().trim() !== myUser) return false;
    return true;
  });
  const cpRecords = (allRecords.checkpoints||[]).filter(r=>{
    if(!r?.vuelo) return false;
    if((r.estatus||"").toLowerCase()==="completado") return false;
    if(!isAdmin && (r.usuario||"").toLowerCase().trim() !== myUser) return false;
    return true;
  });

  console.log("[buildResumable] badges:", all.length, "zonas:", zonaRecords.length, "cps:", cpRecords.length);
  if (cpRecords.length > 0) {
    console.log("  first cp:", cpRecords[0].vuelo, cpRecords[0].fecha, "key:", mkKey(cpRecords[0].vuelo, cpRecords[0].fecha));
  }
  if (all.length > 0) {
    var sample = all.find(r=>(r.estatus||"")!=="completado");
    if (sample) console.log("  first badge:", sample.vuelo, sample.fecha, "key:", mkKey(sample.vuelo, sample.fecha));
  }
  console.log("  group keys:", Object.keys(groups));

  // ── Attach zones to groups (create group if missing) ──────────
  zonaRecords.forEach(r=>{
    const key = mkKey(r.vuelo, r.fecha);
    // Create group if not exists (flight had zones but badge wasn't logged yet)
    if(!groups[key]) groups[key]={
      vuelo:r.vuelo,aerolinea:r.aerolinea||"",fecha:r.fecha,
      gate:r.gate||"",arr:"",dest:"",dep:"",bridge:"",
      usuario:r.usuario||"",records:[],
      sheet:"inspeccion",zones:{},checkpoints:{}
    };
    if(r.zona_id) {
      groups[key].zones[r.zona_id]={
        finding:r.hallazgo||"clear",note:r.nota||"",
        hora:r.hora_zona||"",fotos:r.fotos||0
      };
    }
    console.log("[zona] key:", key, "zona_id:", r.zona_id, "group found:", !!groups[key]);
  });

  // ── Attach checkpoints to groups (create group if missing) ────
  cpRecords.forEach(r=>{
    const key = mkKey(r.vuelo, r.fecha);
    if(!groups[key]) groups[key]={
      vuelo:r.vuelo,aerolinea:r.aerolinea||"",fecha:r.fecha,
      gate:r.gate||"",arr:"",dest:"",dep:"",bridge:"",
      usuario:r.usuario||"",records:[],
      sheet:"rampa",zones:{},checkpoints:{}
    };
    if(r.cp_id) {
      groups[key].checkpoints[r.cp_id]={
        timestamp:r.hora_cp||"",done:true,
        hasPhoto:r.tiene_foto==="Si"
      };
    }
    console.log("[cp] key:", key, "cp_id:", r.cp_id, "group found:", !!groups[key]);
  });

  console.log("[buildResumable] groups:", Object.keys(groups).length);
  Object.keys(groups).forEach(k=>{
    const g=groups[k];
    console.log("  group:", k, "records:", g.records.length, "zones:", Object.keys(g.zones).length, "cps:", Object.keys(g.checkpoints).length);
  });

  window._resumableList=Object.values(groups).sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
  filterResumable();
}

function filterResumable(){
  console.log("[filterResumable] list length:", (window._resumableList||[]).length);
  const vFlight=(document.getElementById("retomar-vuelo")?.value||"").trim().toLowerCase();
  const vFecha=document.getElementById("retomar-fecha")?.value||"";
  const el=document.getElementById("resumable-list"); if(!el) return;

  if(!SCRIPT_URL){
    el.innerHTML=`<div style="padding:14px;border-radius:8px;background:rgba(255,179,0,.06);
      border:1px solid rgba(255,179,0,.25);font-family:var(--mono);font-size:10px;color:var(--amber);line-height:1.9">
      ⚠ URL no configurada.<br>
      <a href="login.html" style="color:var(--cyan);text-decoration:none">← Ir a Configuración ⚙</a>
    </div>`; return;
  }

  const list=(window._resumableList||[]).filter(g=>{
    if(vFlight&&!(g.vuelo||"").toLowerCase().includes(vFlight)) return false;
    if(vFecha){
      const m=(g.fecha||"").match(/(\d{1,2})[\/](\d{1,2})[\/](\d{4})/);
      if(m){const d=new Date(+m[3],+m[2]-1,+m[1]);if(d.toDateString()!==new Date(vFecha).toDateString()) return false;}
    }
    return true;
  }).slice(0,20);

  if(!list.length){
    el.innerHTML=`<div class="empty">
      <div class="ei">⚡</div>
      <div style="font-family:var(--mono);font-size:10px">Sin operaciones en proceso</div>
      <button onclick="goNewReport()" style="margin-top:10px;padding:11px 20px;border-radius:8px;
        background:var(--amber);color:#1a0f00;border:none;font-family:var(--head);font-size:11px;
        font-weight:700;letter-spacing:.06em;cursor:pointer">+ INICIAR NUEVO REPORTE</button>
    </div>`; return;
  }

  const shColors={inspeccion:"var(--cyan)",control:"var(--neon)",rampa:"var(--amber)"};
  const shLabels={inspeccion:"Inspección",control:"Control Accesos",rampa:"Rampa"};

  el.innerHTML=list.map((g,i)=>{
    const sheets=[...new Set(g.records.map(r=>r._sheet))];
    const count=g.records.length;
    const safeG=JSON.stringify(g).replace(/"/g,"&quot;");
    return `<div class="resume-card su" style="animation-delay:${i*.05}s">
      <div style="width:42px;height:42px;border-radius:8px;background:rgba(255,179,0,.1);
        border:1px solid rgba(255,179,0,.3);display:flex;align-items:center;
        justify-content:center;font-size:18px;flex-shrink:0">⚡</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px">
          <span style="font-family:var(--head);font-size:13px;font-weight:700;color:var(--cyan)">${g.vuelo||"—"}</span>
          <span style="font-family:var(--mono);font-size:9px;color:var(--t3)">${g.aerolinea||""}</span>
          ${sheets.map(s=>`<span class="badge" style="background:${shColors[s]}15;color:${shColors[s]};border:1px solid ${shColors[s]}30">${shLabels[s]||s}</span>`).join("")}
        </div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--dim);line-height:1.6">
          ${g.fecha||"?"} · ${count} credencial${count!==1?"es":""}
          ${g.gate?` · Puerta ${g.gate}`:""}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:5px">
          ${Object.keys(g.zones||{}).length>0?`<span style="font-family:var(--mono);font-size:8px;padding:2px 8px;border-radius:3px;background:rgba(0,229,255,.1);color:var(--cyan);border:1px solid rgba(0,229,255,.2)">✅ ${Object.keys(g.zones).length} zona${Object.keys(g.zones).length!==1?"s":""}</span>`:""}
          ${Object.keys(g.checkpoints||{}).length>0?`<span style="font-family:var(--mono);font-size:8px;padding:2px 8px;border-radius:3px;background:rgba(255,179,0,.1);color:var(--amber);border:1px solid rgba(255,179,0,.2)">📍 ${Object.keys(g.checkpoints).length} checkpoint${Object.keys(g.checkpoints).length!==1?"s":""}</span>`:""}
        </div>
      </div>
      <button class="btn-resume" onclick="resumeOperation(${safeG})">⚡ Retomar</button>
    </div>`;
  }).join("");
}

function resumeOperation(group){
  const zonaCount = Object.keys(group.zones||{}).length;
  const cpCount   = Object.keys(group.checkpoints||{}).length;
  const extraMsg  = (zonaCount>0 ? `\n✅ ${zonaCount} zona${zonaCount!==1?"s":""} completada${zonaCount!==1?"s":""}` : "") +
                    (cpCount>0   ? `\n📍 ${cpCount} checkpoint${cpCount!==1?"s":""} registrado${cpCount!==1?"s":""}` : "");
  if(!confirm(`¿Retomar ${group.vuelo||"?"}?\n${group.records.length} credencial${group.records.length!==1?"es":""} recuperadas.${extraMsg}`)) return;
  const recovery={
    flight:{
      id:group.vuelo||"?",airline:group.aerolinea||"",
      gate:group.gate||"--",dep:group.dep||"",arr:group.arr||"",
      dest:group.dest||"---",bridge:group.bridge||"",
      folderName:`${(group.aerolinea||"OP").replace(/\s+/g,"_").slice(0,8)}_${group.vuelo||"?"}`,
      date:(group.fecha||"").replace(/\//g,""),
    },
    badges:group.records.map(r=>({
      time:r.hora||"",late:false,
      direction:r.direccion==="SALIDA"?"out":"in",
      ocr:{nombre:r.nombre||"",cedula:r.cedula||"",empresa:r.empresa||"",
        vigencia:r.vigencia||"",numero_credencial:r.id_cred||""},
      photo:null,
    })),
    zones:       group.zones       || {},
    checkpoints: group.checkpoints || {},
    sheet:group.records[0]?._sheet||"inspeccion",
    recoveredAt:new Date().toISOString(),
  };
  localStorage.setItem("avsec_recovery",JSON.stringify(recovery));
  window.location.href="index.html?recover=1";
}

// ── HELPERS ───────────────────────────────────────────────────
function kpi(label,value,color){
  return `<div class="stat-card">
    <div style="font-family:var(--head);font-size:24px;font-weight:900;color:${color};
      text-shadow:0 0 10px ${color}40;line-height:1">${value}</div>
    <div style="font-family:var(--mono);font-size:7px;color:var(--dim);margin-top:5px;
      letter-spacing:.05em">${label}</div>
  </div>`;
}
function isExpired(v){
  if(!v) return false;
  const m=v.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(!m) return false;
  let[,d,mo,y]=m; if(y.length===2)y="20"+y;
  return new Date(+y,+mo-1,+d,23,59,59)<new Date();
}
function exportCSV(){
  if(!filtered.length) return;
  const h=["Tipo","Fecha","Hora","Vuelo","Aerolínea","Nombre","Cédula","Empresa","Vigencia","N° Cred.","Dirección","Estatus"];
  const r=filtered.map(r=>[r._sheet,r.fecha,r.hora,r.vuelo,r.aerolinea,r.nombre,r.cedula,r.empresa,r.vigencia,r.id_cred,r.direccion,r.estatus]
    .map(v=>`"${(v||"").replace(/"/g,'""')}"`).join(","));
  const csv=[h.join(","),...r].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));
  a.download=`AVSEC_Historial_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
function showNoScript(){
  const kg=document.getElementById("kpi-grid");
  if(kg) kg.innerHTML=`<div style="grid-column:1/-1;padding:14px 16px;border-radius:8px;
    background:rgba(255,179,0,.06);border:1px solid rgba(255,179,0,.25);

    ⚠ URL del Apps Script no configurada.<br>
    <a href="login.html" style="color:var(--cyan);text-decoration:none">← Ir a login.html → ⚙ Configuración</a>
  </div>`;
}
function showError(msg){
  const kg=document.getElementById("kpi-grid");
  if(kg) kg.innerHTML=`<div style="grid-column:1/-1;padding:14px;border-radius:8px;
    background:rgba(255,23,68,.06);border:1px solid rgba(255,23,68,.2);
    font-family:var(--mono);font-size:10px;color:var(--red)">${msg}</div>`;
}
